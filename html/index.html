<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Shop</title>

    <link rel="stylesheet" href="../css/main.css">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="wrapper">

        <aside>

            <header>
                <h1 class="logo">Car Shop</h1>
            </header>

            <nav>
                <ul class="menu">

                    <li>
                        <button class="boton-menu boton-categoria active" id="todos">
                            <i class="bi bi-hand-index-thumb-fill"></i>
                            Todos los productos
                        </button>
                    </li>

                    <li>
                        <button class="boton-menu boton-categoria" id="abrigos">
                            <i class="bi bi-hand-index-thumb"></i>
                            Abrigos
                        </button>
                    </li>

                    <li>
                        <button class="boton-menu boton-categoria" id="camisas">
                            <i class="bi bi-hand-index-thumb"></i>
                            Camisas
                        </button>
                    </li>

                    <li>
                        <button class="boton-menu boton-categoria" id="pantalones">
                            <i class="bi bi-hand-index-thumb"></i>
                            Pantalones
                        </button>
                    </li>

                    <li>
                        <a class="boton-menu boton-carrito" href="./carrito.html">
                            <i class="bi bi-cart-fill"></i>
                            Carrito
                            <span id="numero" class="numero">0</span>
                        </a>
                    </li>

                </ul>
            </nav>

            <footer>
                <p class="texto-footer">
                    © 2026 Car Shop. Todos los derechos reservados.
                </p>
            </footer>

        </aside>

        <main>

            <h2 class="titulo-principal">Todos los productos</h2>

            <div class="contenedor-productos">

                <!-- Producto 1 -->
                <div class="producto">

                    <img class="producto-imagen"
                    src="../img/abrigos/01.jpg"
                    alt="Abrigo 01">

                    <div class="producto-detalles">
                        <h3 class="producto-titulo">Abrigo 01</h3>

                        <p class="producto-precio">$1000</p>

                        <button class="boton-agregar">
                            Agregar al carrito
                        </button>
                    </div>

                </div>

                <!-- Producto 2 -->
                <div class="producto">

                    <img class="producto-imagen"
                    src="../img/abrigos/02.jpg"
                    alt="Abrigo 02">

                    <div class="producto-detalles">
                        <h3 class="producto-titulo">Abrigo 02</h3>

                        <p class="producto-precio">$1000</p>

                        <button class="boton-agregar">
                            Agregar al carrito
                        </button>
                    </div>

                </div>

                <!-- Producto 3 -->
                <div class="producto">

                    <img class="producto-imagen"
                    src="../img/abrigos/03.jpg"
                    alt="Abrigo 03">

                    <div class="producto-detalles">
                        <h3 class="producto-titulo">Abrigo 03</h3>

                        <p class="producto-precio">$1000</p>

                        <button class="boton-agregar">
                            Agregar al carrito
                        </button>
                    </div>

                </div>

                <!-- Producto 4 -->
                <div class="producto">

                    <img class="producto-imagen"
                    src="../img/abrigos/04.jpg"
                    alt="Abrigo 04">

                    <div class="producto-detalles">
                        <h3 class="producto-titulo">Abrigo 04</h3>

                        <p class="producto-precio">$1000</p>

                        <button class="boton-agregar">
                            Agregar al carrito
                        </button>
                    </div>

                </div>

            </div>

        </main>

    </div>

    <script src="../js/main.js"></script>

</body>
</html>
